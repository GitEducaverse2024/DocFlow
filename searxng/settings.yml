use_default_settings: true
server:
  secret_key: "${SEARXNG_SECRET_KEY}"
  bind_address: "0.0.0.0:8080"
search:
  safe_search: 0
  formats:
    - html
    - json
engines:
  - name: brave
    engine: brave
    shortcut: br
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
  - name: google
    engine: google
    shortcut: g
    disabled: false
